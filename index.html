                <div class="hero-image-wrapper cursor-hover-item" data-cursor-text=" CHLOE " data-cursor-text-repeat="4">

                    <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=800&auto=format&fit=crop" alt="Chloe smiling at graduation" class="hero-image">

        <div class="cursor cursor--small"></div>
        <div class="cursor cursor--large"></div>
        <div class="cursor cursor--text">
            <div class="text"></div>
